<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5856d6"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 左の吹き出し（大） -->
  <rect x="80" y="120" width="220" height="140" rx="28" fill="white" opacity="0.95"/>
  <polygon points="140,260 120,300 180,260" fill="white" opacity="0.95"/>
  <!-- 左の吹き出しの中の線 -->
  <rect x="115" y="162" width="150" height="10" rx="5" fill="#007aff" opacity="0.3"/>
  <rect x="115" y="190" width="120" height="10" rx="5" fill="#007aff" opacity="0.2"/>
  <rect x="115" y="218" width="140" height="10" rx="5" fill="#007aff" opacity="0.15"/>
  <!-- 右の吹き出し（小） -->
  <rect x="220" y="260" width="200" height="110" rx="24" fill="white" opacity="0.85"/>
  <polygon points="380,370 400,405 340,370" fill="white" opacity="0.85"/>
  <!-- 右の吹き出しの中の線 -->
  <rect x="252" y="296" width="136" height="9" rx="4.5" fill="#5856d6" opacity="0.3"/>
  <rect x="252" y="320" width="100" height="9" rx="4.5" fill="#5856d6" opacity="0.2"/>
</svg>
